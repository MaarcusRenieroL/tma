<section class="forgot-password-section">
  <div class="forgot-password-container">
    <p-card class="forgot-password-card">
      <div class="forgot-password-header">
        <h2 class="forgot-password-title">Reset Password</h2>
        <p class="forgot-password-description">
          Enter your email below
        </p>
      </div>

      <div class="forgot-password-content">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            pInputText
            id="email"
            type="email"
            name="email"
            placeholder="Enter your email"
            required
            class="form-input"
          />
        </div>
      </div>

      <div class="forgot-password-footer">
        <button pButton class="forgot-password-button">Send reset password link</button>
        <button pButton class="forgot-password-button" link="true" outlined="true" text="true">Back to Login</button>
      </div>
    </p-card>
  </div>
</section>
