<section class="reset-password-section">
  <div class="reset-password-container">
    <p-card class="reset-password-card">
      <div class="reset-password-header">
        <h2 class="reset-password-title">Reset Password</h2>
        <p class="reset-password-description">
          Enter your new password below
        </p>
      </div>

      <div class="reset-password-content">
        <div class="form-group">
          <label for="password">Password</label>
          <input
            pInputText
            id="password"
            type="password"
            name="password"
            placeholder="Enter your password"
            required
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input
            pInputText
            id="confirm-password"
            type="password"
            name="confirmPassword"
            placeholder="Confirm your password"
            required
            class="form-input"
          />
        </div>
      </div>

      <div class="reset-password-footer">
        <button pButton class="reset-password-button">Reset Password</button>
        <button pButton class="reset-password-button" link="true" outlined="true" text="true">Back to Login</button>
      </div>
    </p-card>
  </div>
</section>
